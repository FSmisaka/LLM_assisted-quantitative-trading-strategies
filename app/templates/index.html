<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quant Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.plot.ly/plotly-3.0.0.min.js"></script>
</head>
<body>

<div class="app">

  <!-- ═══════════════ Sidebar ═══════════════ -->
  <nav class="sidebar" id="sidebar">

    <!-- Icon strip -->
    <div class="sb-icons">
      <button class="sb-icon active" data-panel="data" title="数据源">
        <span class="sb-icon-symbol">📡</span>
        <span class="sb-icon-label">数据源</span>
      </button>
      <button class="sb-icon" data-panel="indicator" title="指标">
        <span class="sb-icon-symbol">⚙️</span>
        <span class="sb-icon-label">指标</span>
      </button>
      <button class="sb-icon" data-panel="signal" title="交易信号">
        <span class="sb-icon-symbol">📊</span>
        <span class="sb-icon-label">信号</span>
      </button>
      <button class="sb-icon" data-panel="backtest" title="回测">
        <span class="sb-icon-symbol">🧪</span>
        <span class="sb-icon-label">回测</span>
      </button>
      <button class="sb-icon" data-panel="turtle" title="海龟">
        <span class="sb-icon-symbol">🐢</span>
        <span class="sb-icon-label">海龟</span>
      </button>
      <button class="sb-icon" data-panel="ml" title="ML量化">
        <span class="sb-icon-symbol">🤖</span>
        <span class="sb-icon-label">ML量化</span>
      </button>
    </div>

    <!-- Panel: Data Source ═══════════════════ -->
    <div class="sb-panel" id="panel-data">
      <h3 class="panel-heading">📡 数据源</h3>

      <div class="field">
        <label>本地文件</label>
        <div class="field-with-btn">
          <select id="data-file"></select>
          <button id="btn-refresh-files" class="icon-btn" title="刷新列表">🔄</button>
        </div>
      </div>

      <div class="sep"><span>或获取新数据</span></div>

      <div class="field">
        <label>股票代码</label>
        <input type="text" id="ts-code" value="688256.SH" placeholder="如 688256.SH">
      </div>
      <div class="code-chips">
        <span onclick="setCode('688256.SH')">寒武纪</span>
        <span onclick="setCode('600519.SH')">贵州茅台</span>
        <span onclick="setCode('000001.SZ')">平安银行</span>
        <span onclick="setCode('688111.SH')">金山办公</span>
      </div>

      <div class="field-row">
        <div class="field"><label>起始</label><input type="text" id="start-date" value="20250701"></div>
        <div class="field"><label>结束</label><input type="text" id="end-date" value="20260701"></div>
      </div>

      <button id="btn-fetch" class="btn primary full">🚀 获取数据</button>
      <div id="fetch-status"></div>
    </div>

    <!-- Panel: Indicator ═══════════════════ -->
    <div class="sb-panel" id="panel-indicator">
      <h3 class="panel-heading">⚙️ 技术指标</h3>

      <!-- Indicator selector cards -->
      <div class="indicator-cards" id="indicator-cards">
        <button class="ind-card active" data-ind="price_ma">
          <span class="ind-icon">📈</span>
          <span class="ind-name">Price + MA</span>
          <span class="ind-desc">收盘价与移动平均线</span>
        </button>
        <button class="ind-card" data-ind="rsi">
          <span class="ind-icon">📊</span>
          <span class="ind-name">RSI</span>
          <span class="ind-desc">相对强弱指数</span>
        </button>
        <button class="ind-card" data-ind="macd">
          <span class="ind-icon">📉</span>
          <span class="ind-name">MACD</span>
          <span class="ind-desc">指数平滑异同移动平均线</span>
        </button>
        <button class="ind-card" data-ind="bb">
          <span class="ind-icon">🎯</span>
          <span class="ind-name">布林带</span>
          <span class="ind-desc">Bollinger Bands</span>
        </button>
      </div>

      <!-- Dynamic parameter area -->
      <div class="ind-params" id="ind-params">
        <!-- Populated by JS based on selected indicator -->
      </div>

      <button id="btn-apply" class="btn accent full">✨ 刷新图表</button>
      <div id="compute-status"></div>
    </div>

    <!-- Panel: Signal ═══════════════════ -->
    <div class="sb-panel" id="panel-signal">
      <h3 class="panel-heading">📊 最新交易日信号</h3>
      <div id="signal-content">
        <p class="muted">请先选择数据并计算指标</p>
      </div>
    </div>

    <!-- Panel: Backtest ═══════════════════ -->
    <div class="sb-panel" id="panel-backtest">
      <h3 class="panel-heading">🧪 双均线回测</h3>

      <div class="field">
        <label>数据文件</label>
        <select id="bt-file"></select>
      </div>

      <div class="field-row">
        <div class="field"><label>回测起始</label><input type="text" id="bt-start-date" placeholder="YYYYMMDD"></div>
        <div class="field"><label>回测结束</label><input type="text" id="bt-end-date" placeholder="YYYYMMDD"></div>
      </div>

      <div class="field-row">
        <div class="field"><label>短周期 SMA</label><input type="number" id="bt-short-sma" value="5" min="2" max="250"></div>
        <div class="field"><label>长周期 SMA</label><input type="number" id="bt-long-sma" value="20" min="3" max="500"></div>
      </div>

      <div class="field">
        <label>初始资金 (CNY)</label>
        <input type="number" id="bt-capital" value="100000" min="1000" step="1000">
      </div>

      <div class="field field-inline">
        <label class="toggle-label">
          <input type="checkbox" id="bt-commission">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          启用手续费（万分之三）
        </label>
      </div>

      <div class="bt-actions">
        <button id="btn-bt-reset" class="btn full btn-outline">🔄 重置默认参数</button>
        <button id="btn-bt-run" class="btn accent full">▶ 运行回测</button>
      </div>
      <div id="bt-status" class="status-msg"></div>
    </div>

    <!-- Panel: Turtle ═══════════════════ -->
    <div class="sb-panel" id="panel-turtle">
      <h3 class="panel-heading">🐢 海龟交易法则</h3>

      <div class="field">
        <label>数据文件</label>
        <select id="tu-file"></select>
      </div>

      <div class="field-row">
        <div class="field"><label>回测起始</label><input type="text" id="tu-start-date" placeholder="YYYYMMDD"></div>
        <div class="field"><label>回测结束</label><input type="text" id="tu-end-date" placeholder="YYYYMMDD"></div>
      </div>

      <div class="field-row">
        <div class="field"><label>入场通道周期</label><input type="number" id="tu-entry-period" value="20" min="2" max="250"></div>
        <div class="field"><label>出场通道周期</label><input type="number" id="tu-exit-period" value="10" min="2" max="250"></div>
      </div>

      <div class="field-row">
        <div class="field"><label>ATR 周期</label><input type="number" id="tu-atr-period" value="14" min="2" max="100"></div>
        <div class="field"><label>加仓步长 (×ATR)</label><input type="number" id="tu-add-step" value="0.5" min="0.1" max="5.0" step="0.1"></div>
      </div>

      <div class="field">
        <label>初始资金 (CNY)</label>
        <input type="number" id="tu-capital" value="100000" min="1000" step="1000">
      </div>

      <div class="field field-inline">
        <label class="toggle-label">
          <input type="checkbox" id="tu-commission">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          启用手续费（万分之三）
        </label>
      </div>

      <div class="bt-actions">
        <button id="btn-tu-reset" class="btn full btn-outline">🔄 重置默认参数</button>
        <button id="btn-tu-run" class="btn accent full">▶ 运行回测</button>
      </div>
      <div id="tu-status" class="status-msg"></div>
    </div>

    <!-- Panel: ML Quant 机器学习量化 -->
    <div class="sb-panel" id="panel-ml">
      <h3 class="panel-heading">🤖 ML 量化分析</h3>

      <div class="field">
        <label>数据文件</label>
        <select id="ml-file"></select>
      </div>

      <div class="field">
        <label>模型类型</label>
        <select id="ml-model-type">
          <option value="random_forest">随机森林 (Random Forest)</option>
          <option value="decision_tree">决策树 (Decision Tree)</option>
          <option value="linear">线性回归 (Linear)</option>
          <option value="xgboost">XGBoost</option>
        </select>
      </div>

      <div class="field">
        <label>任务类型</label>
        <select id="ml-task-type">
          <option value="regression">回归 (Regression)</option>
          <option value="classification">分类 (Classification)</option>
        </select>
      </div>

      <div class="field-row">
        <div class="field"><label>每期选股数</label><input type="number" id="ml-top-n" value="30" min="5" max="100"></div>
        <div class="field"><label>去极值(%)</label><input type="number" id="ml-winsorize" value="1" min="0" max="10" step="0.5"></div>
      </div>

      <div class="field-row">
        <div class="field"><label>训练比例</label><input type="number" id="ml-train-ratio" value="0.6" min="0.3" max="0.8" step="0.05"></div>
        <div class="field"><label>验证比例</label><input type="number" id="ml-val-ratio" value="0.2" min="0.1" max="0.3" step="0.05"></div>
      </div>

      <div class="field field-inline">
        <label class="toggle-label">
          <input type="checkbox" id="ml-standardize" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          因子标准化
        </label>
      </div>

      <div class="bt-actions">
        <button id="btn-ml-analyze" class="btn accent full">▶ 运行分析</button>
        <button id="btn-ml-compare" class="btn full btn-outline">🔬 多模型对比</button>
      </div>
      <div id="ml-status" class="status-msg"></div>
    </div>
  </nav>

  <!-- ═══════════════ Chart ═══════════════ -->
  <main class="main" id="main">
    <div id="chart-empty" class="chart-empty">
      <div class="empty-icon">📈</div>
      <h2>Quant Dashboard</h2>
      <p>选择数据源 → 选择指标 → 查看图表</p>
    </div>
    <div id="chart-container"></div>

    <!-- ════════ Backtest Results ════════ -->
    <div id="backtest-container">
      <!-- KPI cards -->
      <div class="bt-kpi-row" id="bt-kpi-row">
        <div class="bt-kpi-card" id="kpi-annual">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">年化收益率</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="kpi-sharpe">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">夏普比率</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="kpi-drawdown">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">最大回撤</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="kpi-winrate">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">胜率</span>
          <span class="bt-kpi-sub"></span>
        </div>
      </div>
      <!-- Dual MA signal chart -->
      <div id="bt-chart-ma" class="bt-chart bt-chart-ma"></div>
      <!-- Bottom row: drawdown + comparison -->
      <div class="bt-chart-row">
        <div id="bt-chart-dd" class="bt-chart bt-chart-half"></div>
        <div id="bt-chart-cmp" class="bt-chart bt-chart-half"></div>
      </div>
    </div>

    <!-- ════════ ML Results ════════ -->
    <div id="ml-container">
      <!-- KPI Cards -->
      <div class="bt-kpi-row" id="ml-kpi-row">
        <div class="bt-kpi-card" id="ml-kpi-annual">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">年化收益率</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="ml-kpi-sharpe">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">夏普比率</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="ml-kpi-drawdown">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">最大回撤</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="ml-kpi-winrate">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">胜率</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="ml-kpi-ic">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">Rank IC (Mean)</span>
          <span class="bt-kpi-sub"></span>
        </div>
      </div>

      <!-- Model Metrics Row -->
      <div class="bt-kpi-row" id="ml-model-metrics-row" style="display:none;">
        <div class="bt-kpi-card" id="ml-metric-r2">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">R² / Accuracy</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="ml-metric-mse">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">MSE</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="ml-metric-mae">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">MAE</span>
          <span class="bt-kpi-sub"></span>
        </div>
      </div>

      <!-- Cumulative NAV Chart -->
      <div id="ml-chart-nav" class="bt-chart bt-chart-ma" style="flex: 2.2;"></div>

      <!-- Bottom row: Quarterly returns + Feature importance -->
      <div class="bt-chart-row">
        <div id="ml-chart-quarterly" class="bt-chart bt-chart-half"></div>
        <div id="ml-chart-importance" class="bt-chart bt-chart-half"></div>
      </div>

      <!-- IC Series Chart -->
      <div id="ml-chart-ic" class="bt-chart bt-chart-ma" style="flex: 1.2;"></div>
    </div>

    <!-- ════════ Turtle Results ════════ -->
    <div id="turtle-container">
      <div class="bt-kpi-row" id="tu-kpi-row">
        <div class="bt-kpi-card" id="tu-kpi-annual">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">年化收益率</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="tu-kpi-sharpe">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">夏普比率</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="tu-kpi-drawdown">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">最大回撤</span>
          <span class="bt-kpi-sub"></span>
        </div>
        <div class="bt-kpi-card" id="tu-kpi-winrate">
          <span class="bt-kpi-value">--</span>
          <span class="bt-kpi-label">胜率</span>
          <span class="bt-kpi-sub"></span>
        </div>
      </div>
      <div id="tu-chart-main" class="bt-chart bt-chart-ma"></div>
      <div class="bt-chart-row">
        <div id="tu-chart-dd" class="bt-chart bt-chart-half"></div>
        <div id="tu-chart-cmp" class="bt-chart bt-chart-half"></div>
      </div>
    </div>
  </main>

</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
